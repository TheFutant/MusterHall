services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-musterhall}
      POSTGRES_USER: ${POSTGRES_USER:-musterhall}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-musterhall}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Point Django at the db service regardless of what .env says.
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media:/app/media
    ports:
      - "${WEB_PORT:-8000}:8000"

volumes:
  pgdata:
  media:
