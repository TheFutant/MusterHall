{% load humanize %}
<div class="table-wrap">
  <table>
    <tbody>
      {% for row in rows %}
      <tr>
        <td>{{ row.label }}</td>
        <td style="width:45%">
          <div class="bar-track" style="margin:0">
            <div class="bar-fill" style="width:{% widthratio row.models total_models 100 %}%"></div>
          </div>
        </td>
        <td class="muted" style="text-align:right;white-space:nowrap">
          {{ row.models|intcomma }} model{{ row.models|pluralize }} · {{ row.items }} entr{{ row.items|pluralize:"y,ies" }}
        </td>
      </tr>
      {% empty %}
      <tr><td class="muted">No data.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
